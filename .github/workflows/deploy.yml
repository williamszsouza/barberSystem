name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
      - run: npm install
      - run: npm test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Build Backend Image
        run: docker build -t barber-backend:latest -f backend.Dockerfile .
        
      - name: Build Frontend Image
        run: docker build -t barber-frontend:latest -f frontend/frontend.Dockerfile ./frontend

      # Aqui você adicionaria o login no AWS ECR e o push das imagens
      # Para o Estágio 1 (EC2), você pode rodar o docker-compose build direto no servidor.
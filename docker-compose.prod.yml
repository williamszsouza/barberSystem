version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: barber-backend
    restart: always
    ports:
      - "3334:3334"
    env_file: .env
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: frontend.Dockerfile
    container_name: barber-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3334

  postgres:
    image: postgres:15-alpine
    container_name: barber-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-barbershop_db}
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: barber-redis
    restart: always

  evolution-api:
    image: atendai/evolution-api:latest
    container_name: evolution-api
    restart: always
    environment:
      - SERVER_PORT=8080
      - AUTH_TOKEN=${EVOLUTION_TOKEN}
    ports:
      - "8080:8080"

volumes:
  pgdata: